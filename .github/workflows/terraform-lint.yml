# .github/workflows/terraform-lint.yml
#
# Terraform static analysis: fmt, validate, tflint.
# Runs on every push and PR. Zero AWS credentials required
# (except the optional terraform plan job at the bottom).

name: Terraform Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.tf'
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dir:
          - static-website-codepipeline
          - static-website-scaffolding
          - visit-counter
          - daily-stock-checker
          - ping-me
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -diff
        working-directory: ${{ matrix.dir }}

      - name: Terraform init (backend=false)
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_wrapper: false

      - name: Init TFLint (AWS plugin)
        run: |
          cat > .tflint.hcl << 'EOF'
          plugin "aws" {
            enabled = true
            version = "0.36.0"
            source  = "github.com/terraform-linters/tflint-ruleset-aws"
          }
          EOF
          tflint --init
        working-directory: ${{ matrix.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --force
        working-directory: ${{ matrix.dir }}

