# .github/workflows/iac-lint.yml
#
# Tier 1 — Static analysis for all IaC stacks in turbo-tribble.
# Runs on every push and PR. Zero AWS credentials required
# (except the Terraform plan job, which is optional and gated).
#
# What this covers:
#   Terraform  → fmt, validate, tflint, checkov
#   CDK (TS)   → tsc, cdk synth, cfn-lint on synth output, checkov
#   CloudFormation → cfn-lint, checkov
#
# What this does NOT cover:
#   - Actual deployments (Tier 3 — build separately if/when you need it)
#   - terraform plan (requires AWS creds — see the optional job at the bottom)

name: IaC Lint & Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Detect which directories changed so we only
  # run relevant jobs. Saves time on partial edits.
  # ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      # cdk: ${{ steps.filter.outputs.cdk }}
      cloudformation: ${{ steps.filter.outputs.cloudformation }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - '**/*.tf'
            # cdk:
            #   - '**/*-stack.ts'
            #   - '**/cdk.json'
            #   - '**/package.json'
            #   - '**/tsconfig.json'
            cloudformation:
              - '**/*.yml'
              - '**/*.yaml'
              - '!.github/**'

  # ──────────────────────────────────────────────
  # TERRAFORM
  # Runs across all directories containing .tf files
  # ──────────────────────────────────────────────
  terraform-lint:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dir:
          - static-website-codepipeline
          - static-website-scaffolding
          - visit-counter
          - daily-stock-checker
          - ping-me
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -diff
        working-directory: ${{ matrix.dir }}

      - name: Terraform init (backend=false)
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_wrapper: false

      - name: Init TFLint (AWS plugin)
        run: |
          cat > .tflint.hcl << 'EOF'
          plugin "aws" {
            enabled = true
            version = "0.36.0"
            source  = "github.com/terraform-linters/tflint-ruleset-aws"
          }
          EOF
          tflint --init
        working-directory: ${{ matrix.dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --force
        working-directory: ${{ matrix.dir }}

  # ──────────────────────────────────────────────
  # CLOUDFORMATION
  # Lints all .yml/.yaml files that look like CFN
  # templates (excludes .github/ directory)
  # ──────────────────────────────────────────────
  cfn-lint:
    needs: changes
    if: needs.changes.outputs.cloudformation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dir:
          - static-website-codepipeline
          - static-website-scaffolding
          - visit-counter
          - daily-stock-checker
          - ping-me
    steps:
      - uses: actions/checkout@v4

      - name: Setup cfn-lint
        uses: scottbrenner/cfn-lint-action@v2

      - name: Run cfn-lint
        run: |
          # Find CFN templates — they'll have AWSTemplateFormatVersion or Resources at top level
          for f in ${{ matrix.dir }}/*.yml ${{ matrix.dir }}/*.yaml; do
            [ -f "$f" ] || continue
            if head -20 "$f" | grep -qE '(AWSTemplateFormatVersion|Resources:)'; then
              echo "::group::Linting $f"
              cfn-lint -t "$f"
              echo "::endgroup::"
            fi
          done

  # ──────────────────────────────────────────────
  # CDK (TypeScript)
  # Type-check → synth → cfn-lint the output
