  # ──────────────────────────────────────────────
  # SECURITY SCAN — Checkov across everything
  # Runs on all IaC types in one pass
  # ──────────────────────────────────────────────
  checkov:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # only if you want SARIF upload
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          # Scan Terraform, CloudFormation, and any CDK-synth output
          framework: terraform,cloudformation
          # Start permissive — you WILL get noise on first run.
          # Review findings, then add skip_check for intentional decisions.
          # Example: skip_check: CKV_AWS_18,CKV_AWS_21
          soft_fail: true  # Don't block PRs until you've triaged initial findings
          output_format: cli
          # To upload to GitHub Security tab instead:
          # output_format: sarif
          # output_file_path: checkov-results.sarif

      # Uncomment once you switch to SARIF output:
