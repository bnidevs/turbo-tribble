AWSTemplateFormatVersion: "2010-09-09"
Description: Daily Stock Checker - Lambda with EventBridge Mon-Fri 5 PM UTC schedule

Parameters:
  SnsTopicArn:
    Type: String
    Description: ARN of the SNS topic for price notifications

  FmpApiKey:
    Type: String
    NoEcho: true
    Description: Financial Modeling Prep API key

  StockSymbol:
    Type: String
    Default: AMZN

  TargetPrice:
    Type: Number
    Default: 300

  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package

  S3Key:
    Type: String
    Default: daily-stock-checker/lambda_function.zip
    Description: S3 key for the Lambda deployment package

Resources:
  # --- IAM ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: daily-stock-checker-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: daily-stock-checker-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SnsTopicArn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # --- Lambda ---
  StockCheckerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: daily-stock-checker
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Environment:
        Variables:
          API_KEY: !Ref FmpApiKey
          STOCK: !Ref StockSymbol
          TARGET: !Ref TargetPrice
          SNS_TOPIC_ARN: !Ref SnsTopicArn

  # --- EventBridge ---
  DailyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: daily-stock-checker-schedule
      Description: Triggers stock checker Lambda Mon-Fri at 5 PM UTC
      ScheduleExpression: "cron(0 17 ? * MON-FRI *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt StockCheckerFunction.Arn
          Id: StockCheckerTarget

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StockCheckerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyScheduleRule.Arn

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt StockCheckerFunction.Arn

  EventRuleArn:
    Value: !GetAtt DailyScheduleRule.Arn
